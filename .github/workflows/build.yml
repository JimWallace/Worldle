name: Build

# Compile-checks the app on a macOS runner (the iOS frameworks only exist on macOS).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project Globle/Globle.xcodeproj \
            -scheme Globle \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
