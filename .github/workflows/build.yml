name: Build

# Compile-checks and unit-tests the app on macOS (the iOS frameworks only exist there).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project Globle/Globle.xcodeproj \
            -scheme Globle \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  test:
    name: Unit tests (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project Globle/Globle.xcodeproj \
            -scheme Globle \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test
